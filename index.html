const soles = (n) => "S/ " + n.toLocaleString("es-PE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const num = (n) => n.toLocaleString("es-PE");
function servStatus(tipo, desdeKm) {
  const rem = tipo.intervalo - desdeKm;
  if (rem <= 0) return { estado: "Vencido", color: C.red, rem };
  if (rem <= 2000) return { estado: "Próximo", color: C.amber, rem };
  return { estado: "Al día", color: C.green, rem };
}
const estadoColor = (e) =>
  e === "Operativo" ? C.green

  : C.red;

function tireMetrics(t, truckKm) {
  const recorridos = Math.max(1, truckKm - t.kmInst);
  const usableNuevo = t.profNueva - t.limite;
  const usado = Math.max(0.1, t.profNueva - t.profActual);
  const kmPorMm = recorridos / usado;
  const vidaTotal = kmPorMm * usableNuevo;
  const kmRestante = Math.max(0, vidaTotal - recorridos);
  const desgastePct = Math.min(100, (usado / usableNuevo) * 100);
  const costoKm = t.costo / vidaTotal;
  return { recorridos, vidaTotal, kmRestante, desgastePct, costoKm };
}
function tireStatus(t) {
  if (t.profActual <= t.limite) return { estado: "Cambiar ya", color: C.red };
  if (t.profActual <= t.limite + 2) return { estado: "Próximo cambio", color: C.amber };
  return { estado: "Operativa", color: C.green };
}

const fmtFechaLarga = (d) => `${d.getDate()} ${["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"][d.getMonth()]} del ${d.getFullYear()}`;

// Proyección de desgaste por TIEMPO: mm/día, % gastado, días restantes y fechas
function tireWear(t, truckKm, kmDia) {
  const kmDiaSeguro = Math.max(20, kmDia || 80);
  const recorridos = Math.max(1, truckKm - t.kmInst);
  const diasUso = Math.max(1, Math.round(recorridos / kmDiaSeguro));
  const usableNuevo = t.profNueva - t.limite;          // mm útiles totales
  const usado = Math.max(0.1, t.profNueva - t.profActual); // mm ya gastados
  const mmDia = usado / diasUso;                        // ritmo de desgaste
  const pctGastado = Math.min(100, (usado / usableNuevo) * 100);

  const restRevision = t.profActual - (t.limite + 2);  // hasta "próximo cambio"
  const restCambio = t.profActual - t.limite;          // hasta "cambiar ya"
  const diasRevision = Math.max(0, Math.round(restRevision / mmDia));
  const diasCambio = Math.max(0, Math.round(restCambio / mmDia));

  const hoy = new Date("2026-05-31");
  const fechaRevision = new Date(hoy); fechaRevision.setDate(hoy.getDate() + diasRevision);
  const fechaCambio = new Date(hoy); fechaCambio.setDate(hoy.getDate() + diasCambio);
  const fechaInst = new Date(hoy); fechaInst.setDate(hoy.getDate() - diasUso);

  // Serie de cocada en el tiempo: historia (real) + proyección (punteada) hasta el límite
  const histPts = 10;
  const serie = [];
  for (let i = 0; i <= histPts; i++) {
    const d = new Date(fechaInst); d.setDate(fechaInst.getDate() + Math.round((diasUso * i) / histPts));
    const frac = i / histPts;
    const wobble = Math.sin(t.id * 7.7 + i * 2.3) * 0.12;
    const mm = +(t.profNueva - usado * frac + wobble).toFixed(1);
    serie.push({ fecha: fmtFecha(d), real: Math.max(t.profActual, mm), proy: null });
  }
  serie[serie.length - 1].real = t.profActual;
  serie[serie.length - 1].proy = t.profActual;
  const pasos = Math.min(Math.max(diasCambio, 1), 30);
  for (let i = 1; i <= pasos; i++) {
    const dd = Math.round((diasCambio * i) / pasos);
    const d = new Date(hoy); d.setDate(hoy.getDate() + dd);
    serie.push({ fecha: fmtFecha(d), real: null, proy: +Math.max(t.limite, t.profActual - mmDia * dd).toFixed(1) });
  }

  return { recorridos, diasUso, mmDia, pctGastado, diasRevision, diasCambio,
           fechaRevision, fechaCambio, fechaInst, serie, usado, usableNuevo };
}

const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Set","Oct","Nov","Dic"];
const fmtFecha = (d) => `${d.getDate()} ${MESES[d.getMonth()]}`;

// Serie diaria de km (determinística por camión) terminando en el km actual
function serieDiaria(truck, dias = 21) {
  const base = truck.capGal >= 79 ? 210 : truck.capGal >= 53 ? 150 : 95;
  const vals = [];
  let total = 0;
  const start = new Date("2026-05-31");
  for (let i = 0; i < dias; i++) {
    const d = new Date(start); d.setDate(start.getDate() - (dias - 1 - i));
    const domingo = d.getDay() === 0;
    const seed = Math.sin(truck.id * 12.9898 + i * 4.1414) * 0.5 + 0.5; // 0..1
    let v = domingo ? 0 : Math.round((base * (0.65 + seed * 0.7)) / 5) * 5;
    vals.push({ d, v });
    total += v;
  }
  let acc = truck.km - total;
  const startKm = acc;
  const serie = vals.map(({ d, v }) => { acc += v; return { fecha: fmtFecha(d), kmDia: v, acum: acc }; });
  const diasActivos = vals.filter((x) => x.v > 0).length || 1;
  const prom = Math.round(total / diasActivos);
  return { serie, prom, startKm };
}

// Próximo mantenimiento (el de menor km restante) + proyección de fecha
function proximoMant(truck, kmDiaProm) {
  let best = null;
  MANT_TIPOS.forEach((tp) => {
    const s = servStatus(tp, desdeKm(truck, tp.key));
    if (!best || s.rem < best.rem) best = { tipo: tp, ...s };
  });
  const diasRest = best.rem > 0 ? Math.ceil(best.rem / Math.max(1, kmDiaProm)) : 0;
  const fecha = new Date("2026-05-31");
  fecha.setDate(fecha.getDate() + diasRest);
  const kmObjetivo = truck.km + Math.max(0, best.rem);
  return { ...best, diasRest, fecha, kmObjetivo };
}

    const operativos = flota.filter((t) => t.estado === "Operativo").length;
    const mesLogs = fuel.filter((f) => f.fecha.startsWith("2026-05"));
    const galMes = mesLogs.reduce((a, f) => a + f.galones, 0);
    const costoMes = mesLogs.reduce((a, f) => a + f.galones * f.precio, 0);
    const kmTot = mesLogs.reduce((a, f) => a + (f.km - f.kmAnt), 0);
    const rend = galMes ? kmTot / galMes : 0;
    return { vencidos, proximos, operativos, total: flota.length, galMes, costoMes, rend };
  }, [flota, fuel]);

  const alertas = useMemo(() => {
    const out = [];
    flota.forEach((t) => MANT_TIPOS.forEach((tp) => {
      const s = servStatus(tp, desdeKm(t, tp.key));
      if (s.estado !== "Al día") out.push({ placa: t.placa, modelo: t.modelo, servicio: tp.nombre, ...s });
    }));
    return out.sort((a, b) => a.rem - b.rem);
  }, [flota]);

  const fuelPorCamion = useMemo(() => {
    const map = {};
    fuel.filter((f) => f.fecha.startsWith("2026-05")).forEach((f) => {
      const t = flota.find((x) => x.id === f.truckId); if (!t) return;
      if (!map[t.placa]) map[t.placa] = { placa: t.placa, costo: 0, gal: 0 };
      map[t.placa].costo += f.galones * f.precio; map[t.placa].gal += f.galones;
    });
    return Object.values(map).sort((a, b) => b.costo - a.costo);
  }, [fuel, flota]);

  const registrarServicio = (truckId, key) =>
    setFlota((prev) => prev.map((t) => (t.id === truckId ? { ...t, ultimoServ: { ...t.ultimoServ, [key]: t.km } } : t)));

  const addFuel = (data) => {
    const t = flota.find((x) => x.id === data.truckId);
    const kmAnt = t ? t.km : data.km - 1;
    setFuel((prev) => [...prev, { id: Date.now(), ...data, kmAnt }]);
    setFlota((prev) => prev.map((x) => (x.id === data.truckId ? { ...x, km: data.km } : x)));
    setFuelModal(false);
  };

  const updateKm = (truckId, km) =>
    setFlota((prev) => prev.map((t) => (t.id === truckId ? { ...t, km } : t)));

  const saveEquipo = (truckId, equipo, estadoTxt) => {
    setEquipoFlota((prev) => ({ ...prev, [truckId]: { ...equipo } }));
    setFlota((prev) => prev.map((t) => (t.id === truckId ? { ...t, estado: estadoTxt } : t)));
  };

  const NAV_ALL = [
    { key: "dashboard", label: "Resumen", icon: LayoutDashboard },
    { key: "flota", label: "Flota", icon: Truck },
    { key: "mant", label: "Mantenimiento", icon: Wrench },
    { key: "comb", label: "Combustible", icon: Fuel },
    { key: "llantas", label: "Llantas", icon: CircleDot },
    { key: "proy", label: "Proyección", icon: TrendingUp },
    { key: "bitacora", label: "Bitácora", icon: ClipboardList },
    { key: "miunidad", label: "Mi unidad", icon: Truck },
  ];
  const cfg = ROLES[rol];
  const NAV = NAV_ALL.filter((n) => cfg.tabs.includes(n.key));

  return (
    <div style={{ background: C.bg, color: C.text, fontFamily: fontBody, minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:9px;height:9px}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:6px}
        ::-webkit-scrollbar-track{background:transparent}
        @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
        .rise{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
        .tnum{font-variant-numeric:tabular-nums}
        .hov{transition:all .18s ease}
        .hov:hover{border-color:${C.green}55 !important;transform:translateY(-2px)}
      `}</style>

      <header style={{ borderBottom: `1px solid ${C.border}`, background: C.bg2 }}>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "16px 22px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <div className="flex items-center" style={{ gap: 13 }}>
            <div style={{ width: 42, height: 42, borderRadius: 11, background: `linear-gradient(135deg, ${C.greenDeep}, ${C.teal})`, display: "grid", placeItems: "center", boxShadow: `0 6px 22px ${C.green}33` }}>
              <Truck size={22} color="#04120C" strokeWidth={2.4} />
            </div>
            <div>
              <div style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 19, letterSpacing: ".4px" }}>
                FLOTA<span style={{ color: C.green }}>VIDA</span>
              </div>
              <div style={{ fontSize: 11.5, color: C.textMut, letterSpacing: ".3px" }}>
                Gestión de mantenimiento, combustible y llantas · Transvida Perú
              </div>
            </div>
          </div>
          <div className="flex items-center" style={{ gap: 12 }}>
            {/* Selector de rol */}
            <div style={{ position: "relative" }}>
              <button onClick={() => setRolOpen((o) => !o)} className="flex items-center"
                style={{ gap: 9, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "7px 12px", cursor: "pointer", color: C.text, fontFamily: fontBody }}>
                <cfg.icon size={16} color={C.teal} />
                <div style={{ textAlign: "left" }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600, lineHeight: 1.1 }}>{cfg.label}</div>
                  <div style={{ fontSize: 10, color: C.textFaint }}>{cfg.sub}</div>
                </div>
                <ChevronDown size={14} color={C.textMut} />
              </button>
              {rolOpen && (
                <div style={{ position: "absolute", top: "calc(100% + 6px)", right: 0, background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 11, padding: 6, minWidth: 210, zIndex: 40, boxShadow: "0 12px 30px rgba(0,0,0,.4)" }}>
                  {Object.entries(ROLES).map(([k, r]) => (
                    <button key={k} onClick={() => cambiarRol(k)} className="flex items-center"

            onFuel={() => setFuelModal(true)} onUpdateKm={updateKm}
            bitacora={bitacora} addEvento={addEvento} quitarEvento={quitarEvento}
            kmInicioDia={kmInicioDia} setKmInicioDia={setKmInicioDia} />

        return <TruckModal truck={tActual} fuel={fuel} equipoInicial={equipoFlota[selTruck.id]} onClose={() => setSelTruck(null)} onSaveEquipo={saveEquipo} />;

  );
}

/* ============================ COMBUSTIBLE ============================ */
function Combustible({ fuel, flota }) {
  const [filtro, setFiltro] = useState("todos");
  const [metric, setMetric] = useState("rend");
  const placa = (id) => flota.find((t) => t.id === id)?.placa ?? "—";
  const PAL = [C.green, C.teal, C.amber, C.blue, C.red, "#A78BFA", "#F472B6", "#FB923C", "#22D3EE", "#FACC15"];
  const colorDe = (id) => PAL[flota.findIndex((t) => t.id === id) % PAL.length];

  const todos = fuel.map((f) => ({ ...f, rend: +((f.km - f.kmAnt) / f.galones).toFixed(1), costo: +(f.galones * f.precio).toFixed(2) }));
  const esUnidad = filtro !== "todos";
  const filtrados = esUnidad ? todos.filter((f) => f.truckId === +filtro) : todos;
  const logs = [...filtrados].sort((a, b) => b.fecha.localeCompare(a.fecha));

  // KPIs según filtro
  const galMes = filtrados.reduce((a, f) => a + f.galones, 0);
  const costoMes = filtrados.reduce((a, f) => a + f.costo, 0);
  const precProm = filtrados.length ? filtrados.reduce((a, f) => a + f.precio, 0) / filtrados.length : 0;
  const kmTot = filtrados.reduce((a, f) => a + (f.km - f.kmAnt), 0);
  const rendProm = galMes ? kmTot / galMes : 0;

  // Cuadro general: una fila por fecha, una columna por unidad
  const METR = { rend: { key: "rend", label: "Rendimiento", unidad: "km/gal", fmt: (v) => `${v} km/gal` },
                 costo: { key: "costo", label: "Costo", unidad: "S/", fmt: (v) => soles(v) },
                 galones: { key: "galones", label: "Galones", unidad: "gal", fmt: (v) => `${v} gal` } };
  const mc = METR[metric];
  const fechas = [...new Set(todos.map((f) => f.fecha))].sort();
  const serieGeneral = fechas.map((fe) => {
    const row = { fecha: fe.slice(5).replace("-", "/") };
    todos.filter((f) => f.fecha === fe).forEach((f) => { row[placa(f.truckId)] = f[mc.key]; });
    return row;
  });

  // Detalle por unidad
  const serieUnidad = [...filtrados].sort((a, b) => a.fecha.localeCompare(b.fecha))
    .map((f) => ({ fecha: f.fecha.slice(5).replace("-", "/"), costo: f.costo, galones: f.galones, rend: f.rend }));

  const card = (delay) => ({ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 15, padding: 20, animationDelay: `${delay}ms` });
  const chip = (active, accent) => ({
    padding: "7px 13px", borderRadius: 99, fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: fontBody,
    border: `1px solid ${active ? (accent || C.green) : C.border}`,
    background: active ? `${accent || C.green}1E` : C.surface,
    color: active ? (accent || C.green) : C.textMut, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 7,
  });

  return (
    <div>
      <div className="flex items-center rise" style={{ gap: 9, marginBottom: 14 }}>
        <Fuel size={20} color={C.amber} />
        <h2 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 18, margin: 0 }}>Combustible</h2>
      </div>

      {/* Filtro por botones */}
      <div className="rise" style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16, alignItems: "center" }}>
        <button onClick={() => setFiltro("todos")} style={chip(filtro === "todos")}>
          <Truck size={14} /> Toda la flota
        </button>
        {flota.map((t) => (
          <button key={t.id} onClick={() => setFiltro(String(t.id))} style={chip(filtro === String(t.id), colorDe(t.id))}>
            <span style={{ width: 8, height: 8, borderRadius: 99, background: colorDe(t.id) }} /> {t.placa}
          </button>
        ))}
        {(esUnidad || metric !== "rend") && (
          <button onClick={() => { setFiltro("todos"); setMetric("rend"); }}
            style={{ padding: "7px 13px", borderRadius: 99, fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: fontBody, border: `1px dashed ${C.border}`, background: "transparent", color: C.textFaint, display: "flex", alignItems: "center", gap: 6 }}>
            <X size={13} /> Restablecer
          </button>
        )}
      </div>

      {/* KPIs */}
      <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(180px,1fr))", gap: 13, marginBottom: 18 }}>
        <Kpi icon={Droplet} label="Galones (mes)" value={num(galMes)} sub="diésel B5 consumido" accent={C.amber} delay={0} />
        <Kpi icon={CircleDollarSign} label="Gasto total (mes)" value={soles(costoMes)} sub={esUnidad ? placa(+filtro) : "combustible flota"} accent={C.green} delay={50} />
        <Kpi icon={Fuel} label="Precio promedio" value={soles(precProm)} sub="por galón" accent={C.teal} delay={100} />
        <Kpi icon={Gauge} label="Rendimiento" value={`${rendProm.toFixed(1)} km/gal`} sub={esUnidad ? "de la unidad" : "promedio flota"} accent={C.blue} delay={150} />
      </div>

      {/* CUADRO GENERAL: todas las unidades en una línea */}
      <div className="rise" style={{ ...card(180), marginBottom: 18 }}>
        <div className="flex items-center" style={{ justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 10 }}>
          <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 15, margin: 0 }}>Cuadro general · {mc.label} por unidad</h3>
          <div style={{ display: "flex", gap: 6 }}>
            {Object.values(METR).map((m) => (
              <button key={m.key} onClick={() => setMetric(m.key)} style={chip(metric === m.key, C.teal)}>{m.label}</button>
            ))}
          </div>
        </div>
        <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 14 }}>
          cada línea es un camión · {mc.unidad} en el tiempo {esUnidad ? `· resaltando ${placa(+filtro)}` : "· toca un botón para resaltar una unidad"}
        </div>
        <ResponsiveContainer width="100%" height={330}>
          <ComposedChart data={serieGeneral} margin={{ left: 4, right: 12, top: 8 }}>
            <CartesianGrid stroke={C.borderSoft} vertical={false} />
            <XAxis dataKey="fecha" stroke={C.textFaint} fontSize={10.5} />
            <YAxis stroke={C.textFaint} fontSize={11} tickFormatter={(v) => metric === "costo" ? `S/${(v / 1000).toFixed(1)}k` : v} width={metric === "costo" ? 46 : 32} domain={metric === "rend" ? [0, "auto"] : ["auto", "auto"]} />
            <Tooltip contentStyle={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 9, fontSize: 12 }} labelStyle={{ color: C.text }} formatter={(v, n) => [mc.fmt(v), n]} />
            <Legend wrapperStyle={{ fontSize: 11, color: C.textMut, paddingTop: 6 }} />
            {flota.map((t) => {
              const dim = esUnidad && +filtro !== t.id;
              const hi = esUnidad && +filtro === t.id;
              return (
                <Line key={t.id} type="monotone" dataKey={t.placa} name={t.placa}
                  stroke={colorDe(t.id)} strokeWidth={hi ? 3.2 : 2} strokeOpacity={dim ? 0.16 : 1}
                  dot={{ r: hi ? 4 : 3, fill: colorDe(t.id), strokeWidth: 0, fillOpacity: dim ? 0.16 : 1 }}
                  activeDot={{ r: 5 }} connectNulls />
              );
            })}
          </ComposedChart>
        </ResponsiveContainer>
      </div>

      {/* Comparativas de flota */}
      <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 18, marginBottom: 18 }}>
        <div className="rise" style={card(220)}>
          <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 14.5, margin: "0 0 4px" }}>Gasto por unidad</h3>
          <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 12 }}>mayo 2026 · soles</div>
          <ResponsiveContainer width="100%" height={250}>
            <BarChart data={flota.map((t) => ({ placa: t.placa, id: t.id, costo: todos.filter((f) => f.truckId === t.id).reduce((a, f) => a + f.costo, 0) })).filter((u) => u.costo > 0).sort((a, b) => b.costo - a.costo)} layout="vertical" margin={{ left: 8, right: 16 }}>
              <CartesianGrid horizontal={false} stroke={C.borderSoft} />
              <XAxis type="number" stroke={C.textFaint} fontSize={11} tickFormatter={(v) => `${(v / 1000).toFixed(1)}k`} />
              <YAxis type="category" dataKey="placa" stroke={C.textMut} fontSize={11} width={64} />
              <Tooltip cursor={{ fill: `${C.green}10` }} contentStyle={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 9, fontSize: 12 }} labelStyle={{ color: C.text }} formatter={(v) => [soles(v), "Gasto"]} />
              <Bar dataKey="costo" radius={[0, 5, 5, 0]} cursor="pointer" onClick={(d) => setFiltro(String(d.id))}>
                {flota.map((t) => <Cell key={t.id} fill={esUnidad && +filtro !== t.id ? `${colorDe(t.id)}40` : colorDe(t.id)} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="rise" style={card(260)}>
          <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 14.5, margin: "0 0 4px" }}>Rendimiento por unidad</h3>
          <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 12 }}>km/galón · mayor es mejor</div>
          <ResponsiveContainer width="100%" height={250}>
            <BarChart data={flota.map((t) => { const ls = todos.filter((f) => f.truckId === t.id); const g = ls.reduce((a, f) => a + f.galones, 0); const k = ls.reduce((a, f) => a + (f.km - f.kmAnt), 0); return { placa: t.placa, id: t.id, rend: g ? +(k / g).toFixed(1) : 0 }; }).filter((u) => u.rend > 0).sort((a, b) => b.rend - a.rend)} layout="vertical" margin={{ left: 8, right: 16 }}>
              <CartesianGrid horizontal={false} stroke={C.borderSoft} />
              <XAxis type="number" stroke={C.textFaint} fontSize={11} />
              <YAxis type="category" dataKey="placa" stroke={C.textMut} fontSize={11} width={64} />
              <Tooltip cursor={{ fill: `${C.teal}10` }} contentStyle={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 9, fontSize: 12 }} labelStyle={{ color: C.text }} formatter={(v) => [`${v} km/gal`, "Rendimiento"]} />
              <Bar dataKey="rend" radius={[0, 5, 5, 0]} cursor="pointer" onClick={(d) => setFiltro(String(d.id))}>
                {flota.map((t) => <Cell key={t.id} fill={esUnidad && +filtro !== t.id ? `${(todos.filter((f) => f.truckId === t.id).reduce((a, f) => a + (f.km - f.kmAnt), 0) / Math.max(1, todos.filter((f) => f.truckId === t.id).reduce((a, f) => a + f.galones, 0))) < 8 ? C.amber : C.teal}40` : (todos.filter((f) => f.truckId === t.id).reduce((a, f) => a + (f.km - f.kmAnt), 0) / Math.max(1, todos.filter((f) => f.truckId === t.id).reduce((a, f) => a + f.galones, 0))) < 8 ? C.amber : C.teal} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Detalle de la unidad seleccionada */}
      {esUnidad && (
        <div className="grid rise" style={{ gridTemplateColumns: "1fr 1fr", gap: 18, marginBottom: 18 }}>
          <div style={card(0)}>
            <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 14.5, margin: "0 0 4px" }}>{placa(+filtro)} · consumo y costo</h3>
            <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 12 }}>barras = costo (S/) · línea = galones</div>
            <ResponsiveContainer width="100%" height={240}>
              <ComposedChart data={serieUnidad} margin={{ left: 2, right: 6, top: 6 }}>
                <CartesianGrid stroke={C.borderSoft} vertical={false} />
                <XAxis dataKey="fecha" stroke={C.textFaint} fontSize={10.5} />
                <YAxis yAxisId="L" stroke={C.amber} fontSize={11} tickFormatter={(v) => `S/${v}`} width={48} />
                <YAxis yAxisId="R" orientation="right" stroke={C.teal} fontSize={11} width={32} />
                <Tooltip contentStyle={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 9, fontSize: 12 }} labelStyle={{ color: C.text }} formatter={(v, n) => n === "Costo" ? [soles(v), "Costo"] : [`${v} gal`, "Galones"]} />
                <Bar yAxisId="L" dataKey="costo" name="Costo" fill={C.amber} radius={[4, 4, 0, 0]} maxBarSize={32} />
                <Line yAxisId="R" type="monotone" dataKey="galones" name="Galones" stroke={C.teal} strokeWidth={2.4} dot={{ r: 3, fill: C.teal }} />
                <Legend wrapperStyle={{ fontSize: 11.5, color: C.textMut }} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
          <div style={card(40)}>
            <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 14.5, margin: "0 0 4px" }}>{placa(+filtro)} · rendimiento por carga</h3>
            <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 12 }}>km/galón en cada abastecimiento</div>
            <ResponsiveContainer width="100%" height={240}>
              <ComposedChart data={serieUnidad} margin={{ left: 2, right: 6, top: 6 }}>
                <CartesianGrid stroke={C.borderSoft} vertical={false} />
                <XAxis dataKey="fecha" stroke={C.textFaint} fontSize={10.5} />
                <YAxis stroke={C.textFaint} fontSize={11} domain={[0, "auto"]} width={32} />
                <Tooltip contentStyle={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 9, fontSize: 12 }} labelStyle={{ color: C.text }} formatter={(v) => [`${v} km/gal`, "Rendimiento"]} />
                <ReferenceLine y={rendProm} stroke={C.textMut} strokeDasharray="4 4" label={{ value: `prom ${rendProm.toFixed(1)}`, position: "insideTopLeft", fill: C.textMut, fontSize: 10 }} />
                <Area type="monotone" dataKey="rend" name="Rendimiento" stroke={C.green} strokeWidth={2.4} fill={`${C.green}22`} dot={{ r: 3, fill: C.green }} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {/* Tabla */}
      <div className="rise" style={card(300)}>
        <div className="flex items-center" style={{ justifyContent: "space-between", marginBottom: 16 }}>
          <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 15, margin: 0 }}>Historial de abastecimientos</h3>
          <span style={{ fontSize: 12, color: C.textMut }}>{logs.length} registro{logs.length !== 1 ? "s" : ""}{esUnidad ? ` · ${placa(+filtro)}` : ""}</span>
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ color: C.textMut, fontSize: 11.5, textAlign: "left" }}>
                {["Fecha", "Unidad", "Galones", "Precio/gal", "Costo", "Km", "Rendimiento"].map((h, i) => (
                  <th key={h} style={{ padding: "8px 10px", fontWeight: 600, textAlign: i >= 2 ? "right" : "left", borderBottom: `1px solid ${C.border}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {logs.map((f) => (
                <tr key={f.id} style={{ borderBottom: `1px solid ${C.borderSoft}` }}>
                  <td style={{ padding: "10px", color: C.textMut }}>{f.fecha.slice(5).replace("-", "/")}</td>
                  <td style={{ padding: "10px", fontWeight: 600, fontFamily: fontDisplay }}>
                    <span className="flex items-center" style={{ gap: 7 }}>
                      <span style={{ width: 7, height: 7, borderRadius: 99, background: colorDe(f.truckId) }} /> {placa(f.truckId)}
                    </span>
                  </td>
                  <td className="tnum" style={{ padding: "10px", textAlign: "right" }}>{f.galones}</td>
                  <td className="tnum" style={{ padding: "10px", textAlign: "right", color: C.textMut }}>{soles(f.precio)}</td>
                  <td className="tnum" style={{ padding: "10px", textAlign: "right", fontWeight: 600 }}>{soles(f.costo)}</td>
                  <td className="tnum" style={{ padding: "10px", textAlign: "right", color: C.textMut }}>{num(f.km)}</td>
                  <td className="tnum" style={{ padding: "10px", textAlign: "right", color: f.rend < 8 ? C.amber : C.green, fontWeight: 600 }}>{f.rend.toFixed(1)} km/gal</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ============================ LLANTAS ============================ */
function Llantas({ flota, llantas }) {
  const km = (id) => flota.find((t) => t.id === id)?.km ?? 0;
  const placa = (id) => flota.find((t) => t.id === id)?.placa ?? "—";
  const kmDiaDe = (id) => { const t = flota.find((x) => x.id === id); return t ? serieDiaria(t).prom : 80; };
  const PAL = [C.green, C.teal, C.amber, C.blue, C.red, "#A78BFA", "#F472B6", "#FB923C", "#22D3EE", "#FACC15"];
  const colorDe = (id) => PAL[flota.findIndex((t) => t.id === id) % PAL.length];

  const [filtroT, setFiltroT] = useState("todos");
  const rowsAll = llantas.map((t) => ({ ...t, ...tireMetrics(t, km(t.truckId)), ...tireStatus(t) }))
    .sort((a, b) => a.profActual - b.profActual);
  const esUnidad = filtroT !== "todos";
  const rows = esUnidad ? rowsAll.filter((r) => r.truckId === +filtroT) : rowsAll;

  const [selLlanta, setSelLlanta] = useState(rowsAll[0].id);
  const aplicarFiltroT = (val) => {
    setFiltroT(val);
    const set = val === "todos" ? rowsAll : rowsAll.filter((r) => r.truckId === +val);
    if (set[0]) setSelLlanta(set[0].id);
  };
  const sel = llantas.find((l) => l.id === selLlanta) || llantas[0];
  const selStatus = tireStatus(sel);
  const w = tireWear(sel, km(sel.truckId), kmDiaDe(sel.truckId));

  // unidades que tienen llantas (para los botones de filtro)
  const unidadesConLlantas = flota.filter((t) => llantas.some((l) => l.truckId === t.id));

  const porCambiar = rows.filter((r) => r.estado !== "Operativa").length;
  const costoKmProm = rows.reduce((a, r) => a + r.costoKm, 0) / (rows.length || 1);
  const vidaProm = rows.reduce((a, r) => a + r.vidaTotal, 0) / (rows.length || 1);

  // comparación de marcas: siempre a nivel flota (economía de marca)
  const marcaMap = {};
  rowsAll.forEach((r) => {
    if (!marcaMap[r.marca]) marcaMap[r.marca] = { marca: r.marca, n: 0, compra: 0, vida: 0, ckm: 0 };
    const g = marcaMap[r.marca]; g.n++; g.compra += r.costo; g.vida += r.vidaTotal; g.ckm += r.costoKm;
  });
  const marcas = Object.values(marcaMap)
    .map((g) => ({ marca: g.marca, n: g.n, compra: g.compra / g.n, vida: g.vida / g.n, ckm: g.ckm / g.n }))
    .sort((a, b) => a.ckm - b.ckm);
  const mejor = marcas[0];
  const barata = [...marcas].sort((a, b) => a.compra - b.compra)[0];
  const peorKm = marcas[marcas.length - 1];

  const chip = (active, accent) => ({
    padding: "7px 13px", borderRadius: 99, fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: fontBody,
    border: `1px solid ${active ? (accent || C.green) : C.border}`,
    background: active ? `${accent || C.green}1E` : C.surface,
    color: active ? (accent || C.green) : C.textMut, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 7,
  });

  return (
    <div>
      <div className="flex items-center rise" style={{ gap: 9, marginBottom: 14 }}>
        <CircleDot size={20} color={C.teal} />
        <h2 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 18, margin: 0 }}>Llantas</h2>
        <span style={{ fontSize: 12, color: C.textMut, background: C.surface, border: `1px solid ${C.border}`, padding: "3px 10px", borderRadius: 99 }}>
          {esUnidad ? `${placa(+filtroT)} · ${rows.length} llantas` : `Flota completa · ${rowsAll.length} llantas`}
        </span>
      </div>

      {/* Filtro por camión */}
      <div className="rise" style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16, alignItems: "center" }}>
        <button onClick={() => aplicarFiltroT("todos")} style={chip(filtroT === "todos")}>
          <Truck size={14} /> Todos
        </button>
        {unidadesConLlantas.map((t) => (
          <button key={t.id} onClick={() => aplicarFiltroT(String(t.id))} style={chip(filtroT === String(t.id), colorDe(t.id))}>
            <span style={{ width: 8, height: 8, borderRadius: 99, background: colorDe(t.id) }} /> {t.placa}
          </button>
        ))}
        {esUnidad && (
          <button onClick={() => aplicarFiltroT("todos")}
            style={{ padding: "7px 13px", borderRadius: 99, fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: fontBody, border: `1px dashed ${C.border}`, background: "transparent", color: C.textFaint, display: "flex", alignItems: "center", gap: 6 }}>
            <X size={13} /> Restablecer
          </button>
        )}
      </div>

      <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(190px,1fr))", gap: 13, marginBottom: 20 }}>
        <Kpi icon={CircleDot} label="Llantas monitoreadas" value={rows.length} sub={esUnidad ? `en ${placa(+filtroT)}` : "en toda la flota"} accent={C.teal} delay={0} />
        <Kpi icon={AlertTriangle} label="Por cambiar" value={porCambiar} sub="al límite o próximas" accent={C.red} delay={50} />
        <Kpi icon={BadgeDollarSign} label="Costo/km promedio" value={soles(costoKmProm)} sub={esUnidad ? "de la unidad" : "por llanta · flota"} accent={C.amber} delay={100} />
        <Kpi icon={Gauge} label="Vida promedio" value={`${Math.round(vidaProm / 1000)}k km`} sub="duración estimada" accent={C.green} delay={150} />
      </div>

      {/* Insight costo/km */}
      <div className="rise" style={{ background: `linear-gradient(135deg, ${C.surface}, ${C.surface2})`, border: `1px solid ${C.border}`, borderRadius: 15, padding: 20, marginBottom: 18, animationDelay: "160ms" }}>
        <div className="flex items-center" style={{ gap: 9, marginBottom: 12 }}>
          <BadgeDollarSign size={18} color={C.amber} />
          <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 15, margin: 0 }}>El precio barato engaña: lo que importa es el costo por km</h3>
        </div>
        <p style={{ fontSize: 13.5, color: C.textMut, lineHeight: 1.6, margin: 0 }}>
          La <b style={{ color: C.text }}>{barata.marca}</b> es la más barata de comprar ({soles(barata.compra)} c/u), pero rinde
          <b style={{ color: C.red }}> {soles(peorKm.ckm)}/km</b> — la más cara de operar.
          La <b style={{ color: C.text }}>{mejor.marca}</b> cuesta más al comprar pero rinde solo
          <b style={{ color: C.green }}> {soles(mejor.ckm)}/km</b>. En una flota de {flota.length} camiones, esa diferencia se multiplica por miles de km al mes.
        </p>
      </div>

      {/* PROYECCIÓN DE DESGASTE POR LLANTA */}
      <div className="rise" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 15, padding: 20, marginBottom: 18, animationDelay: "175ms" }}>
        <div className="flex items-center" style={{ justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 10 }}>
          <div className="flex items-center" style={{ gap: 9 }}>
            <Ruler size={18} color={C.teal} />
            <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 15, margin: 0 }}>Proyección de desgaste · ¿cuándo revisar?</h3>
          </div>
          <select value={selLlanta} onChange={(e) => setSelLlanta(+e.target.value)}
            style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.text, fontSize: 13, fontFamily: fontBody, cursor: "pointer", maxWidth: 280 }}>
            {rows.map((r) => <option key={r.id} value={r.id} style={{ background: C.surface }}>{placa(r.truckId)} · {r.pos} · {r.marca}</option>)}
          </select>
        </div>
        <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 16 }}>
          mide la cocada (mm) con galga y la app calcula el ritmo de desgaste y la fecha de revisión
        </div>

        {/* métricas de desgaste */}
        <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(150px,1fr))", gap: 11, marginBottom: 16 }}>
          {[
            ["Desgaste actual", `${Math.round(w.pctGastado)}%`, `${w.usado.toFixed(1)} de ${w.usableNuevo.toFixed(0)} mm útiles`, selStatus.color],
            ["Ritmo de desgaste", `${w.mmDia.toFixed(3)} mm/día`, `en ${w.diasUso} días de uso`, C.teal],
            ["Cocada actual", `${sel.profActual.toFixed(1)} mm`, `límite de cambio: ${sel.limite} mm`, C.blue],

/* ============================ PROYECCIÓN ============================ */
function Proyeccion({ flota, fuel }) {
  const [sel, setSel] = useState(flota[0].id);
  const truck = flota.find((t) => t.id === sel);
  const { serie, prom } = serieDiaria(truck);
  const next = proximoMant(truck, prom);

  const histo = serie.map((d) => ({ fecha: d.fecha, real: d.acum, proy: null }));
  const proy = [];
  if (next.diasRest > 0) {
    histo[histo.length - 1].proy = truck.km;
    const start = new Date("2026-05-31");
    const steps = Math.min(next.diasRest, 40);
    const inc = next.diasRest > 40 ? next.diasRest / 40 : 1;
    for (let i = 1; i <= steps; i++) {
      const dd = Math.round(i * inc);
      const d = new Date(start); d.setDate(start.getDate() + dd);
      proy.push({ fecha: fmtFecha(d), real: null, proy: Math.round(truck.km + prom * dd) });
    }
  }
  const data = [...histo, ...proy];

  const fl = fuel.filter((f) => f.truckId === truck.id)
    .sort((a, b) => a.fecha.localeCompare(b.fecha))
    .map((f) => ({ fecha: f.fecha.slice(5).replace("-", "/"), galones: f.galones,
      costo: +(f.galones * f.precio).toFixed(2), km: f.km, rend: +((f.km - f.kmAnt) / f.galones).toFixed(1) }));
  const compradoGal = fl.reduce((a, f) => a + f.galones, 0);
  const gastoTot = fl.reduce((a, f) => a + f.costo, 0);
  const kmIni = fl.length ? fl[0].km : truck.km;
  const kmFin = fl.length ? fl[fl.length - 1].km : truck.km;
  const rendProm = compradoGal ? (kmFin - kmIni) / compradoGal : 0;

  const selStyle = { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "9px 12px", color: C.text, fontSize: 14, fontFamily: fontBody };

  return (
    <div>
      <div className="flex items-center" style={{ justifyContent: "space-between", marginBottom: 18, flexWrap: "wrap", gap: 12 }}>
        <div className="flex items-center" style={{ gap: 10 }}>
          <TrendingUp size={20} color={C.green} />
          <h2 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 18, margin: 0 }}>Proyección de uso y mantenimiento</h2>
        </div>
        <select value={sel} onChange={(e) => setSel(+e.target.value)} style={selStyle}>
          {flota.map((t) => <option key={t.id} value={t.id} style={{ background: C.surface }}>{t.placa} · {t.modelo}</option>)}
        </select>
      </div>

      <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(190px,1fr))", gap: 13, marginBottom: 18 }}>
        <Kpi icon={Gauge} label="Promedio diario" value={`${num(prom)} km`} sub="días laborables" accent={C.teal} delay={0} />
        <Kpi icon={Wrench} label="Próximo servicio" value={next.tipo.nombre.split(" ")[0]} sub={next.tipo.nombre} accent={C.amber} delay={50} />
        <Kpi icon={CalendarClock} label="Fecha estimada"
          value={next.diasRest > 0 ? fmtFecha(next.fecha) : "Vencido"}
          sub={next.diasRest > 0 ? `en ~${next.diasRest} días` : `${num(Math.abs(next.rem))} km excedidos`}
          accent={next.diasRest > 0 ? C.green : C.red} delay={100} />
        <Kpi icon={Activity} label="Km al mantenimiento" value={next.rem > 0 ? `${num(next.rem)} km` : "0 km"} sub={`objetivo: ${num(next.kmObjetivo)} km`} accent={C.blue} delay={150} />
      </div>

      {/* Predicción */}
      <div className="rise" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 15, padding: 20, marginBottom: 18, animationDelay: "180ms" }}>
        <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 15, margin: "0 0 4px" }}>Kilometraje acumulado y predicción</h3>
        <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 14 }}>
          línea sólida = recorrido real · punteada = proyección al ritmo actual ({num(prom)} km/día)
        </div>
        <ResponsiveContainer width="100%" height={300}>
          <ComposedChart data={data} margin={{ left: 4, right: 14, top: 8 }}>
            <CartesianGrid stroke={C.borderSoft} vertical={false} />
            <XAxis dataKey="fecha" stroke={C.textFaint} fontSize={10} interval="preserveStartEnd" minTickGap={28} />
            <YAxis stroke={C.textFaint} fontSize={11} domain={["auto", "auto"]} tickFormatter={(v) => `${(v / 1000).toFixed(0)}k`} width={42} />
            <Tooltip contentStyle={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 9, fontSize: 12 }} labelStyle={{ color: C.text }} formatter={(v) => v ? [`${num(v)} km`] : null} />
            <ReferenceLine y={next.kmObjetivo} stroke={C.red} strokeDasharray="5 4"
              label={{ value: "Mantenimiento", position: "insideTopRight", fill: C.red, fontSize: 10.5 }} />
            <Area type="monotone" dataKey="real" name="Recorrido real" stroke={C.green} strokeWidth={2.4} fill={`${C.green}22`} connectNulls={false} dot={false} />
            <Line type="monotone" dataKey="proy" name="Proyección" stroke={C.amber} strokeWidth={2.2} strokeDasharray="5 4" connectNulls dot={false} />
            <Legend wrapperStyle={{ fontSize: 11.5, color: C.textMut }} />
          </ComposedChart>
        </ResponsiveContainer>
        {next.diasRest > 0 && (
          <div style={{ marginTop: 12, padding: "11px 14px", background: `${C.amber}12`, borderRadius: 10, fontSize: 13, color: C.text }}>
            Al ritmo de <b>{num(prom)} km/día</b>, <b>{truck.placa}</b> llegará a su <b>{next.tipo.nombre.toLowerCase()}</b> alrededor del <b style={{ color: C.amber }}>{fmtFecha(next.fecha)}</b> (~{next.diasRest} días).
          </div>
        )}
      </div>

      {/* Combustible del camión */}
      <div className="rise" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 15, padding: 20, animationDelay: "240ms" }}>
        <div className="flex items-center" style={{ justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
          <h3 style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 15, margin: 0 }}>Combustible de {truck.placa}</h3>
          <div className="flex items-center" style={{ gap: 16, fontSize: 12, color: C.textMut, flexWrap: "wrap" }}>
            <span>Compró <b style={{ color: C.text }}>{num(compradoGal)} gal</b></span>
            <span>Gastó <b style={{ color: C.green }}>{soles(gastoTot)}</b></span>
            <span>Km <b style={{ color: C.text }}>{num(kmIni)} → {num(kmFin)}</b></span>
            <span>Rinde <b style={{ color: C.teal }}>{rendProm.toFixed(1)} km/gal</b></span>
          </div>
        </div>
        <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 14 }}>barras = costo por carga (S/) · línea = odómetro (km)</div>
        <ResponsiveContainer width="100%" height={270}>
          <ComposedChart data={fl} margin={{ left: 4, right: 8, top: 8 }}>
            <CartesianGrid stroke={C.borderSoft} vertical={false} />
            <XAxis dataKey="fecha" stroke={C.textFaint} fontSize={10.5} />
            <YAxis yAxisId="L" stroke={C.amber} fontSize={11} tickFormatter={(v) => `S/${v}`} width={48} />
            <YAxis yAxisId="R" orientation="right" stroke={C.teal} fontSize={11} domain={["auto", "auto"]} tickFormatter={(v) => `${(v / 1000).toFixed(0)}k`} width={42} />
            <Tooltip contentStyle={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 9, fontSize: 12 }} labelStyle={{ color: C.text }}
              formatter={(v, n) => n === "Costo" ? [soles(v), "Costo"] : [`${num(v)} km`, "Odómetro"]} />
            <Bar yAxisId="L" dataKey="costo" name="Costo" fill={C.amber} radius={[4, 4, 0, 0]} maxBarSize={34} />
            <Line yAxisId="R" type="monotone" dataKey="km" name="Odómetro" stroke={C.teal} strokeWidth={2.4} dot={{ r: 3, fill: C.teal }} />
            <Legend wrapperStyle={{ fontSize: 11.5, color: C.textMut }} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

/* ============================ CONDUCTOR ============================ */
function Conductor({ truck, fuel, onFuel, onUpdateKm, bitacora, addEvento, quitarEvento, kmInicioDia, setKmInicioDia }) {
  const HOY = new Date().toISOString().slice(0, 10);  // fecha real del sistema
  // km inicio del día: si no se fijó hoy, es el km actual del camión (arranca directo)
  const kmIni = kmInicioDia[truck.id]?.fecha === HOY ? kmInicioDia[truck.id].km : truck.km;

  const [kmFinModal, setKmFinModal] = useState(false);
  const [kmFinVal, setKmFinVal] = useState("");
  const [pidiendoMonto, setPidiendoMonto] = useState(false);
  const [monto, setMonto] = useState(0);

  // eventos de hoy de este camión
  const eventosHoy = bitacora.filter((e) => e.truckId === truck.id && e.ts.slice(0, 10) === HOY);
  const cerrado = kmInicioDia[truck.id]?.cerrado && kmInicioDia[truck.id]?.fecha === HOY;
  const kmFin = cerrado ? kmInicioDia[truck.id].kmFin : null;
  const recorrido = kmFin != null ? Math.max(0, kmFin - kmIni) : 0;

  const cerrarDia = () => {
    const v = +kmFinVal;
    if (v >= kmIni) {
      setKmInicioDia((p) => ({ ...p, [truck.id]: { fecha: HOY, km: kmIni, cerrado: true, kmFin: v } }));
      onUpdateKm(truck.id, v);
      setKmFinModal(false);
    }
  };

  const montosRapidos = [100, 150, 200, 250, 300, 400];
  const acciones = [
    { key: "comb", label: "Eché combustible", icon: Fuel, color: C.amber, onClick: () => { setMonto(0); setPidiendoMonto(true); } },
    { key: "carga", label: "Cargué / recogí", icon: CheckCircle2, color: C.green, onClick: () => addEvento(truck.id, { tipo: "Carga recogida", icon: "CheckCircle2", color: C.green }) },
    { key: "descarga", label: "Entregué / descargué", icon: Truck, color: C.teal, onClick: () => addEvento(truck.id, { tipo: "Entrega realizada", icon: "Truck", color: C.teal }) },
    { key: "llanta", label: "Problema con llanta", icon: CircleDot, color: C.blue, onClick: () => addEvento(truck.id, { tipo: "Problema de llanta", icon: "CircleDot", color: C.blue }) },
    { key: "falla", label: "Falla mecánica", icon: Wrench, color: C.red, onClick: () => addEvento(truck.id, { tipo: "Falla mecánica", icon: "Wrench", color: C.red }) },
    { key: "descanso", label: "Tomé descanso", icon: Clock, color: "#A78BFA", onClick: () => addEvento(truck.id, { tipo: "Descanso", icon: "Clock", color: "#A78BFA" }) },
  ];
  const ICN = { Fuel, CheckCircle2, Truck, CircleDot, Wrench, Clock };
  const hora = (ts) => new Date(ts).toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" });

  const guardarComb = () => { if (monto > 0) { addEvento(truck.id, { tipo: "Combustible", monto, icon: "Fuel", color: C.amber }); setPidiendoMonto(false); } };

  const big = { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 18 };

  return (
    <div style={{ maxWidth: 540, margin: "0 auto" }}>
      {/* Mi camión */}
      <div className="rise" style={{ ...big, background: `linear-gradient(135deg, ${C.surface}, ${C.surface2})`, padding: 20, marginBottom: 14 }}>
        <div style={{ fontSize: 12.5, color: C.textMut }}>Mi camión</div>
        <div style={{ fontFamily: fontDisplay, fontWeight: 900, fontSize: 34, letterSpacing: ".5px", marginTop: 2 }}>{truck.placa}</div>
        <div style={{ fontSize: 13, color: C.textMut }}>{truck.modelo}</div>
      </div>

      {/* Kilómetros del día */}
      <div className="rise" style={{ ...big, padding: 20, marginBottom: 14, animationDelay: "60ms" }}>
        <div className="flex items-center" style={{ gap: 10, marginBottom: 14 }}>
          <div style={{ width: 38, height: 38, borderRadius: 11, background: `${C.teal}1A`, display: "grid", placeItems: "center" }}><Gauge size={20} color={C.teal} /></div>
          <div style={{ fontWeight: 700, fontSize: 16, fontFamily: fontDisplay }}>Kilómetros de hoy</div>
        </div>
        <div className="flex items-center" style={{ gap: 12 }}>
          <div style={{ flex: 1, textAlign: "center", background: C.bg, borderRadius: 12, padding: "12px 8px", border: `1px solid ${C.borderSoft}` }}>
            <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 4 }}>Empecé con</div>
            <div className="tnum" style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 22 }}>{num(kmIni)}</div>
          </div>
          <div style={{ color: C.textFaint, fontSize: 20 }}>→</div>
          <div style={{ flex: 1, textAlign: "center", background: C.bg, borderRadius: 12, padding: "12px 8px", border: `1px solid ${kmFin != null ? C.green + "55" : C.borderSoft}` }}>
            <div style={{ fontSize: 11.5, color: C.textMut, marginBottom: 4 }}>Terminé con</div>
            <div className="tnum" style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 22, color: kmFin != null ? C.green : C.textFaint }}>{kmFin != null ? num(kmFin) : "—"}</div>
          </div>
        </div>
        {recorrido > 0 && (
          <div style={{ textAlign: "center", fontSize: 13, color: C.textMut, marginTop: 10 }}>
            Recorrí <b className="tnum" style={{ color: C.text }}>{num(recorrido)} km</b> hoy
          </div>
        )}
        <div style={{ marginTop: 14 }}>
          {!cerrado ? (
            <button onClick={() => { setKmFinVal(String(truck.km)); setKmFinModal(true); }} style={{ width: "100%", background: C.green, color: "#04120C", border: "none", padding: "15px", borderRadius: 12, fontWeight: 800, fontSize: 16, cursor: "pointer", fontFamily: fontBody }}>
              Cerrar mi día
            </button>
          ) : (
            <div style={{ textAlign: "center", fontSize: 14, fontWeight: 700, color: C.green, padding: "14px", background: `${C.green}12`, borderRadius: 12 }}>✓ Día cerrado</div>
          )}
        </div>
      </div>

      {/* Acciones del día */}
      <div className="rise" style={{ ...big, padding: 20, marginBottom: 14, animationDelay: "120ms" }}>
        <div style={{ fontWeight: 700, fontSize: 16, fontFamily: fontDisplay, marginBottom: 4 }}>¿Qué pasó hoy?</div>
        <div style={{ fontSize: 12.5, color: C.textMut, marginBottom: 14 }}>Toca lo que hiciste. Si te equivocas, lo puedes borrar abajo.</div>
        <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {acciones.map((a) => (
            <button key={a.key} onClick={a.onClick} className="hov" style={{
              display: "flex", flexDirection: "column", alignItems: "center", gap: 8, padding: "18px 10px", borderRadius: 14, cursor: "pointer",
              background: C.bg, border: `1px solid ${C.border}`, color: C.text, fontFamily: fontBody }}>
              <div style={{ width: 46, height: 46, borderRadius: 13, background: `${a.color}1A`, display: "grid", placeItems: "center" }}>
                <a.icon size={24} color={a.color} />
              </div>
              <span style={{ fontSize: 13, fontWeight: 600, textAlign: "center", lineHeight: 1.2 }}>{a.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Registro del día con hora y borrar */}
      {eventosHoy.length > 0 && (
        <div className="rise" style={{ ...big, padding: 20, animationDelay: "160ms" }}>
          <div style={{ fontWeight: 700, fontSize: 15, fontFamily: fontDisplay, marginBottom: 12 }}>Lo que registré hoy</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {eventosHoy.map((e) => {
              const Ic = ICN[e.icon] || CheckCircle2;
              return (
                <div key={e.id} className="flex items-center" style={{ justifyContent: "space-between", background: C.bg, borderRadius: 11, padding: "11px 13px", border: `1px solid ${C.borderSoft}` }}>
                  <span className="flex items-center" style={{ gap: 10 }}>
                    <Ic size={17} color={e.color} />
                    <span style={{ fontSize: 14, fontWeight: 600 }}>{e.tipo}</span>
                    <span className="tnum" style={{ fontSize: 11.5, color: C.textFaint }}>{hora(e.ts)}</span>
                  </span>
                  <span className="flex items-center" style={{ gap: 10 }}>
                    {e.monto ? <span className="tnum" style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 15, color: C.amber }}>{soles(e.monto)}</span> : null}
                    <button onClick={() => quitarEvento(e.id)} title="Borrar" style={{ background: "none", border: "none", color: C.textFaint, cursor: "pointer", display: "grid", placeItems: "center", padding: 2 }}>
                      <X size={16} />
                    </button>
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Modal monto combustible */}
      {pidiendoMonto && (
        <Overlay onClose={() => setPidiendoMonto(false)}>
          <div className="flex items-center" style={{ gap: 10, marginBottom: 4 }}>
            <Fuel size={22} color={C.amber} />
            <h3 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 19, margin: 0 }}>¿Cuánto echaste?</h3>
          </div>
          <p style={{ fontSize: 13, color: C.textMut, margin: "0 0 16px" }}>Toca un monto o escríbelo. Es en soles.</p>
          <div className="tnum" style={{ textAlign: "center", fontFamily: fontDisplay, fontWeight: 900, fontSize: 40, color: monto > 0 ? C.amber : C.textFaint, marginBottom: 16 }}>{soles(monto || 0)}</div>
          <div className="grid" style={{ gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
            {montosRapidos.map((m) => (
              <button key={m} onClick={() => setMonto(m)} className="hov" style={{
                padding: "16px 8px", borderRadius: 12, cursor: "pointer", fontFamily: fontDisplay, fontWeight: 800, fontSize: 17,
                background: monto === m ? `${C.amber}22` : C.bg, border: `1px solid ${monto === m ? C.amber : C.border}`, color: monto === m ? C.amber : C.text }}>S/ {m}</button>
            ))}
          </div>
          <input type="number" inputMode="numeric" placeholder="Otro monto" value={monto || ""} onChange={(e) => setMonto(+e.target.value)}
            style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 12, padding: "13px", color: C.text, fontSize: 18, fontFamily: fontDisplay, fontWeight: 700, textAlign: "center", marginBottom: 14 }} />
          <button disabled={monto <= 0} onClick={guardarComb} style={{
            width: "100%", background: monto > 0 ? C.amber : C.surface2, color: monto > 0 ? "#1A1200" : C.textFaint, border: "none",
            padding: "16px", borderRadius: 12, fontWeight: 800, fontSize: 17, cursor: monto > 0 ? "pointer" : "not-allowed", fontFamily: fontBody }}>Enviar</button>
        </Overlay>
      )}

      {/* Modal cerrar día (km final) */}
      {kmFinModal && (
        <Overlay onClose={() => setKmFinModal(false)}>
          <div className="flex items-center" style={{ gap: 10, marginBottom: 4 }}>
            <Gauge size={22} color={C.green} />
            <h3 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 19, margin: 0 }}>Cerrar mi día</h3>
          </div>
          <p style={{ fontSize: 13, color: C.textMut, margin: "0 0 8px" }}>¿Con cuántos kilómetros terminaste? Míralo en el tablero.</p>
          <div style={{ fontSize: 12, color: C.textFaint, marginBottom: 14 }}>Empezaste con {num(kmIni)} km</div>
          <input type="number" inputMode="numeric" value={kmFinVal} onChange={(e) => setKmFinVal(e.target.value)}
            style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px", color: C.text, fontSize: 26, fontFamily: fontDisplay, fontWeight: 800, textAlign: "center", marginBottom: 8 }} />
          {kmFinVal !== "" && +kmFinVal < kmIni && <div style={{ fontSize: 12, color: C.red, marginBottom: 10 }}>Debe ser mayor o igual a {num(kmIni)}</div>}
          {kmFinVal !== "" && +kmFinVal >= kmIni && <div style={{ fontSize: 13, color: C.textMut, marginBottom: 10, textAlign: "center" }}>Recorriste <b style={{ color: C.text }}>{num(+kmFinVal - kmIni)} km</b></div>}
          <button disabled={kmFinVal === "" || +kmFinVal < kmIni} onClick={cerrarDia} style={{
            width: "100%", background: kmFinVal !== "" && +kmFinVal >= kmIni ? C.green : C.surface2, color: kmFinVal !== "" && +kmFinVal >= kmIni ? "#04120C" : C.textFaint, border: "none",
            padding: "16px", borderRadius: 12, fontWeight: 800, fontSize: 17, cursor: kmFinVal !== "" && +kmFinVal >= kmIni ? "pointer" : "not-allowed", fontFamily: fontBody }}>Guardar y cerrar día</button>
        </Overlay>
      )}
    </div>
  );
}

/* ============================ BITÁCORA (gestión) ============================ */
function Bitacora({ flota, bitacora }) {
  const [filtroT, setFiltroT] = useState("todos");
  const placa = (id) => flota.find((t) => t.id === id)?.placa ?? "—";
  const PAL = [C.green, C.teal, C.amber, C.blue, C.red, "#A78BFA", "#F472B6", "#FB923C", "#22D3EE", "#FACC15"];
  const colorDe = (id) => PAL[flota.findIndex((t) => t.id === id) % PAL.length];
  const ICN = { Fuel, CheckCircle2, Truck, CircleDot, Wrench, Clock };

  const esUnidad = filtroT !== "todos";
  const items = (esUnidad ? bitacora.filter((e) => e.truckId === +filtroT) : bitacora)
    .slice().sort((a, b) => b.ts.localeCompare(a.ts));

  const gastoComb = items.filter((e) => e.monto).reduce((a, e) => a + e.monto, 0);
  const fechaHora = (ts) => { const d = new Date(ts); return d.toLocaleString("es-PE", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }); };

  const chip = (active, accent) => ({
    padding: "7px 13px", borderRadius: 99, fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: fontBody,
    border: `1px solid ${active ? (accent || C.green) : C.border}`, background: active ? `${accent || C.green}1E` : C.surface,
    color: active ? (accent || C.green) : C.textMut, whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 7,
  });

  const conLlantas = flota.filter((t) => bitacora.some((e) => e.truckId === t.id));

  return (
    <div>
      <div className="flex items-center rise" style={{ gap: 9, marginBottom: 14 }}>
        <ClipboardList size={20} color={C.teal} />
        <h2 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 18, margin: 0 }}>Bitácora de conductores</h2>
        <span style={{ fontSize: 12, color: C.textMut, background: C.surface, border: `1px solid ${C.border}`, padding: "3px 10px", borderRadius: 99 }}>
          {items.length} registro{items.length !== 1 ? "s" : ""}
        </span>
      </div>

      {bitacora.length === 0 ? (
        <div className="rise" style={{ background: C.surface, border: `1px dashed ${C.border}`, borderRadius: 15, padding: "40px 20px", textAlign: "center" }}>
          <ClipboardList size={32} color={C.textFaint} style={{ marginBottom: 12 }} />
          <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6 }}>Aún no hay registros</div>
          <div style={{ fontSize: 13, color: C.textMut, maxWidth: 360, margin: "0 auto" }}>
            Cambia al rol <b>Conductor</b> (arriba a la derecha) y registra acciones del día. Aparecerán aquí con su fecha y hora.
          </div>
        </div>
      ) : (
        <>
          {/* filtros por camión */}
          <div className="rise" style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
            <button onClick={() => setFiltroT("todos")} style={chip(filtroT === "todos")}><Truck size={14} /> Todos</button>
            {conLlantas.map((t) => (
              <button key={t.id} onClick={() => setFiltroT(String(t.id))} style={chip(filtroT === String(t.id), colorDe(t.id))}>
                <span style={{ width: 8, height: 8, borderRadius: 99, background: colorDe(t.id) }} /> {t.placa}
              </button>
            ))}
          </div>

          {gastoComb > 0 && (
            <div className="rise" style={{ display: "flex", gap: 13, marginBottom: 16, flexWrap: "wrap" }}>
              <div style={{ flex: 1, minWidth: 200, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: "15px 18px" }}>
                <div style={{ fontSize: 12, color: C.textMut, marginBottom: 6 }}>Combustible reportado por conductores</div>
                <div className="tnum" style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 24, color: C.amber }}>{soles(gastoComb)}</div>
              </div>
            </div>
          )}

          {/* timeline */}
          <div className="rise" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 15, padding: 20 }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ color: C.textMut, fontSize: 11.5, textAlign: "left" }}>
                    {["Fecha y hora", "Unidad", "Evento", "Monto"].map((h, i) => (
                      <th key={h} style={{ padding: "8px 10px", fontWeight: 600, textAlign: i === 3 ? "right" : "left", borderBottom: `1px solid ${C.border}` }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {items.map((e) => {
                    const Ic = ICN[e.icon] || CheckCircle2;
                    return (
                      <tr key={e.id} style={{ borderBottom: `1px solid ${C.borderSoft}` }}>
                        <td className="tnum" style={{ padding: "11px 10px", color: C.textMut, whiteSpace: "nowrap" }}>{fechaHora(e.ts)}</td>
                        <td style={{ padding: "11px 10px", fontWeight: 600, fontFamily: fontDisplay }}>
                          <span className="flex items-center" style={{ gap: 7 }}>
                            <span style={{ width: 7, height: 7, borderRadius: 99, background: colorDe(e.truckId) }} /> {placa(e.truckId)}
                          </span>
                        </td>
                        <td style={{ padding: "11px 10px" }}>
                          <span className="flex items-center" style={{ gap: 9 }}><Ic size={16} color={e.color} /> {e.tipo}</span>
                        </td>
                        <td className="tnum" style={{ padding: "11px 10px", textAlign: "right", fontWeight: 700, color: e.monto ? C.amber : C.textFaint }}>
                          {e.monto ? soles(e.monto) : "—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ============================ MODALES ============================ */
function Overlay({ children, onClose, wide }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.66)", display: "grid", placeItems: "center", zIndex: 50, padding: 18, backdropFilter: "blur(3px)", overflowY: "auto" }}>
      <div onClick={(e) => e.stopPropagation()} className="rise" style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 17, width: "100%", maxWidth: wide ? 560 : 460, padding: 24, margin: "auto", maxHeight: "92vh", overflowY: "auto" }}>
        {children}
      </div>
    </div>
  );
}

function FuelModal({ flota, onClose, onSave }) {
  const [truckId, setTruckId] = useState(flota[0].id);
  const [fecha, setFecha] = useState("2026-05-31");
  const [galones, setGalones] = useState("");
  const [precio, setPrecio] = useState("15.50");
  const [km, setKm] = useState("");
  const [fotoTablero, setFotoTablero] = useState(false);
  const [fotoBoleta, setFotoBoleta] = useState(false);
  const t = flota.find((x) => x.id === truckId);
  const valid = galones > 0 && precio > 0 && km > (t?.km ?? 0) && fotoTablero && fotoBoleta;

  // Control anti-robo: rendimiento de esta carga vs lo esperado
  const recorrido = km > (t?.km ?? 0) ? +km - t.km : 0;
  const rendCarga = galones > 0 && recorrido > 0 ? recorrido / +galones : null;
  const espera = t && t.capGal >= 79 ? 7 : t && t.capGal >= 53 ? 9 : 11; // km/gal esperado por tipo
  const sospechoso = rendCarga !== null && rendCarga < espera * 0.7; // 30% bajo lo normal

  const inp = { width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "10px 12px", color: C.text, fontSize: 14, fontFamily: fontBody, marginTop: 6 };
  const lbl = { fontSize: 12, color: C.textMut, fontWeight: 500 };
  const fotoBtn = (on) => ({ width: "100%", marginTop: 6, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, padding: "11px", borderRadius: 9, cursor: "pointer", fontFamily: fontBody, fontSize: 13, fontWeight: 600,
    background: on ? `${C.green}1A` : C.surface, border: `1px solid ${on ? `${C.green}55` : C.border}`, color: on ? C.green : C.textMut });

  return (
    <Overlay onClose={onClose}>
      <div className="flex items-center" style={{ justifyContent: "space-between", marginBottom: 20 }}>
        <h3 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 18, margin: 0 }}>Registrar abastecimiento</h3>
        <button onClick={onClose} style={{ background: "none", border: "none", color: C.textMut, cursor: "pointer" }}><X size={20} /></button>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <div>
          <span style={lbl}>Unidad</span>
          <select value={truckId} onChange={(e) => setTruckId(+e.target.value)} style={inp}>
            {flota.map((x) => <option key={x.id} value={x.id} style={{ background: C.surface }}>{x.placa} · {x.modelo}</option>)}
          </select>
          <span className="tnum" style={{ fontSize: 11.5, color: C.textFaint }}>Km actual: {num(t?.km ?? 0)}</span>
        </div>
        <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div><span style={lbl}>Fecha</span><input type="date" value={fecha} onChange={(e) => setFecha(e.target.value)} style={inp} /></div>
          <div><span style={lbl}>Odómetro (km)</span><input type="number" value={km} onChange={(e) => setKm(e.target.value)} placeholder={`> ${t?.km ?? 0}`} style={inp} /></div>
          <div><span style={lbl}>Galones</span><input type="number" value={galones} onChange={(e) => setGalones(e.target.value)} placeholder="0" style={inp} /></div>
          <div><span style={lbl}>Precio / galón (S/)</span><input type="number" step="0.01" value={precio} onChange={(e) => setPrecio(e.target.value)} style={inp} /></div>
        </div>

        {/* Evidencia obligatoria (anti-robo) */}
        <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>
            <span style={lbl}>Foto del tablero</span>
            <button onClick={() => setFotoTablero((v) => !v)} style={fotoBtn(fotoTablero)}>
              {fotoTablero ? <CheckCircle2 size={15} /> : <Gauge size={15} />} {fotoTablero ? "Adjuntada" : "Tomar foto"}
            </button>
          </div>
          <div>
            <span style={lbl}>Foto de la boleta</span>
            <button onClick={() => setFotoBoleta((v) => !v)} style={fotoBtn(fotoBoleta)}>
              {fotoBoleta ? <CheckCircle2 size={15} /> : <ClipboardList size={15} />} {fotoBoleta ? "Adjuntada" : "Tomar foto"}
            </button>
          </div>
        </div>

        {galones > 0 && precio > 0 && (
          <div className="flex items-center" style={{ justifyContent: "space-between", background: C.surface, borderRadius: 10, padding: "11px 14px" }}>
            <span style={{ fontSize: 13, color: C.textMut }}>Costo total</span>
            <span className="tnum" style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 17, color: C.green }}>{soles(galones * precio)}</span>
          </div>
        )}

        {/* Alerta de rendimiento anómalo */}
        {sospechoso && (
          <div className="flex items-center" style={{ gap: 10, background: `${C.red}12`, border: `1px solid ${C.red}44`, borderRadius: 10, padding: "11px 13px" }}>
            <AlertTriangle size={22} color={C.red} style={{ flexShrink: 0 }} />
            <span style={{ fontSize: 12.5, color: C.text, lineHeight: 1.4 }}>
              <b style={{ color: C.red }}>Rendimiento bajo:</b> {rendCarga.toFixed(1)} km/gal (lo normal es ~{espera}). Se marcará para que gestión lo revise.
            </span>
          </div>
        )}

        <button disabled={!valid} onClick={() => onSave({ truckId, fecha, galones: +galones, precio: +precio, km: +km })}
          style={{ background: valid ? C.green : C.surface2, color: valid ? "#04120C" : C.textFaint, border: "none", padding: "13px", borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: valid ? "pointer" : "not-allowed", fontFamily: fontBody, marginTop: 4 }}>
          {fotoTablero && fotoBoleta ? "Guardar registro" : "Adjunta las dos fotos para guardar"}
        </button>
      </div>
    </Overlay>
  );
}

function TruckModal({ truck, fuel, equipoInicial, onClose, onSaveEquipo }) {
  const logs = fuel.filter((f) => f.truckId === truck.id);
  const galTot = logs.reduce((a, f) => a + f.galones, 0);
  const costoTot = logs.reduce((a, f) => a + f.galones * f.precio, 0);
  const kmTot = logs.reduce((a, f) => a + (f.km - f.kmAnt), 0);
  const rend = galTot ? kmTot / galTot : 0;

  const [equipo, setEquipo] = useState(() => ({ ...(equipoInicial || EQUIPO_INI[truck.id] || {}) }));
  const [guardado, setGuardado] = useState(false);
  const toggle = (k) => { setEquipo((e) => ({ ...e, [k]: !e[k] })); setGuardado(false); };

  const docs = EQUIPO_CATALOGO.filter((it) => it.tipo === "documento");
  const mecan = EQUIPO_CATALOGO.filter((it) => it.tipo === "mecanico");
  const objs = EQUIPO_CATALOGO.filter((it) => it.tipo === "objeto");
  const faltanDocs = docs.filter((it) => !equipo[it.key]);
  const faltanMecan = mecan.filter((it) => !equipo[it.key]);
  const faltanObjs = objs.filter((it) => !equipo[it.key]);

  // Prioridad: mecánico (taller) > documentos > objetos > operativo
  const estado = faltanMecan.length > 0
    ? { txt: "En taller", color: C.red, desc: `No puede trabajar: ${faltanMecan.map((i) => i.nombre.toLowerCase()).join(", ")}` }
    : faltanDocs.length > 0
      ? { txt: "Falta documentos", color: "#FB923C", desc: `No puede circular: ${faltanDocs.map((i) => i.nombre.split(" ")[0]).join(", ").toLowerCase()}` }
      : faltanObjs.length > 0
        ? { txt: "Faltan objetos", color: C.amber, desc: `Puede trabajar · faltan ${faltanObjs.length} accesorio${faltanObjs.length > 1 ? "s" : ""}` }
        : { txt: "Operativo", color: C.green, desc: "Listo para ruta · todo completo" };

  const itemBtn = (it, faltaColor) => {
    const ok = !!equipo[it.key];
    const c = ok ? C.green : faltaColor;
    return (
      <button key={it.key} onClick={() => toggle(it.key)} className="flex items-center"
        style={{ gap: 9, justifyContent: "space-between", textAlign: "left", padding: "10px 11px", borderRadius: 9, cursor: "pointer", fontFamily: fontBody,
          background: ok ? `${C.green}0E` : `${c}12`, border: `1px solid ${ok ? `${C.green}30` : `${c}40`}`, color: C.text }}>
        <span className="flex items-center" style={{ gap: 8, fontSize: 12.5, minWidth: 0 }}>
          <it.icon size={14} color={c} style={{ flexShrink: 0 }} />
          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.nombre}</span>
        </span>
        {ok ? <CheckCircle2 size={16} color={C.green} style={{ flexShrink: 0 }} /> : <X size={16} color={c} style={{ flexShrink: 0 }} />}
      </button>
    );
  };

  return (
    <Overlay onClose={onClose} wide>
      <div className="flex items-center" style={{ justifyContent: "space-between", marginBottom: 6 }}>
        <div>
          <h3 style={{ fontFamily: fontDisplay, fontWeight: 800, fontSize: 22, margin: 0, letterSpacing: ".5px" }}>{truck.placa}</h3>
          <span style={{ fontSize: 13, color: C.textMut }}>{truck.modelo} · {truck.anio}</span>
        </div>
        <button onClick={onClose} style={{ background: "none", border: "none", color: C.textMut, cursor: "pointer" }}><X size={20} /></button>
      </div>

      {/* Estado operativo calculado */}
      <div className="flex items-center" style={{ gap: 11, background: `${estado.color}12`, border: `1px solid ${estado.color}33`, borderRadius: 11, padding: "11px 13px", margin: "12px 0 18px" }}>
        <span style={{ width: 10, height: 10, borderRadius: 99, background: estado.color, flexShrink: 0 }} />
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: estado.color, fontFamily: fontDisplay }}>{estado.txt}</div>
          <div style={{ fontSize: 12, color: C.textMut }}>{estado.desc}</div>
        </div>
      </div>

      <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 11, marginBottom: 18 }}>
        {[
          [Gauge, "Odómetro", `${num(truck.km)} km`, C.teal],
          [Gauge, "Rendimiento", `${rend.toFixed(1)} km/gal`, C.green],
          [Droplet, "Galones (histórico)", num(galTot), C.amber],
          [CircleDollarSign, "Gasto (histórico)", soles(costoTot), C.blue],
        ].map(([Ic, l, v, c], i) => (
          <div key={i} style={{ background: C.surface, borderRadius: 11, padding: "13px 15px" }}>
            <div className="flex items-center" style={{ gap: 7, color: C.textMut, fontSize: 11.5, marginBottom: 8 }}><Ic size={14} color={c} /> {l}</div>
            <div className="tnum" style={{ fontFamily: fontDisplay, fontWeight: 700, fontSize: 17 }}>{v}</div>
          </div>
        ))}
      </div>

      {/* Documentos */}
      <div className="flex items-center" style={{ gap: 8, marginBottom: 10 }}>
        <ClipboardList size={15} color="#FB923C" />
        <span style={{ fontSize: 12.5, color: C.text, fontWeight: 700 }}>Documentos</span>
        <span style={{ fontSize: 11, color: C.textFaint }}>sin esto no puede circular legalmente</span>
      </div>
      <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 16 }}>
        {docs.map((it) => itemBtn(it, "#FB923C"))}
      </div>

      {/* Mecánico / partes */}
      <div className="flex items-center" style={{ gap: 8, marginBottom: 10 }}>
        <Wrench size={15} color={C.red} />
        <span style={{ fontSize: 12.5, color: C.text, fontWeight: 700 }}>Mecánico y partes</span>
        <span style={{ fontSize: 11, color: C.textFaint }}>si falla, va a taller</span>
      </div>
      <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 16 }}>
        {mecan.map((it) => itemBtn(it, C.red))}
      </div>

      {/* Objetos / accesorios */}
      <div className="flex items-center" style={{ gap: 8, marginBottom: 10 }}>
        <CheckCircle2 size={15} color={C.amber} />
        <span style={{ fontSize: 12.5, color: C.text, fontWeight: 700 }}>Objetos del camión</span>
        <span style={{ fontSize: 11, color: C.textFaint }}>no impide trabajar, pero deben estar</span>
      </div>
      <div className="grid" style={{ gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 18 }}>
        {objs.map((it) => itemBtn(it, C.amber))}
      </div>

      <button onClick={() => { onSaveEquipo && onSaveEquipo(truck.id, equipo, estado.txt); setGuardado(true); }}
        className="flex items-center" style={{ width: "100%", justifyContent: "center", gap: 8, background: guardado ? `${C.green}1A` : C.green, color: guardado ? C.green : "#04120C", border: guardado ? `1px solid ${C.green}55` : "none", padding: "14px", borderRadius: 11, fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: fontBody }}>
        {guardado ? <><CheckCircle2 size={18} /> Cambios guardados</> : "Guardar cambios"}
      </button>
    </Overlay>
  );
}

createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
